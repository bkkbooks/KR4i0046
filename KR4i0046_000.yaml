body:
  text: 提要文說一卷詩文評類臣等謹案文說一卷元陳繹曽撰繹曾字伯敷元史附見儒學傳作處州人而吳興續志亦載其名蓋家本括蒼而徙居苕水者也至順中官至國子監助教嘗從學于戴表元而與陳旅友善師友淵源具有所自故所學頗見根柢是書乃因延祐復行科舉為程試之式而作書中分列八條論行文之法時五經皆以宋儒傳注為主懸為功令莫敢異趨故是書大㫖皆折𠂻于朱子吳興續志稱繹曽嘗著文筌譜論科舉天階使學者知所向方人爭傳録焦竑經籍志又載繹曽古今文矜式二卷今考繹曽所著文筌八卷附詩小譜二卷元時麻沙坊刻附列于䇿學統宗之首今尚有傳本其文與此篇迥殊惟科舉天階與古今文矜式今未之見疑此編即二書之一但名目錯互莫能證定今姑仍永樂大典舊題以文說著録用闕所疑卷首所稱陳文靖公蓋即元翰林學士東平陳儼亦以文名至其自稱先尚書者則已失其世系無可考矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書文說元陳繹曽撰陳文靖公問為文之法繹曽以所聞於先人者對曰一養氣二抱題三眀體四分門五立意六用事七造語八下字養氣法肅朝廷之文宜肅聖賢道德宜肅壯長江大海之文宜壯軍陳英雄之文宜壯清山林之文宜清風月貞逸宜清和宴樂之文宜和通人逹士宜和竒鬼神之文宜竒俠客髙士宜竒麗宫苑之文宜麗富貴美人宜麗古逰覽古迹之文宜古上古人事宜古逺登髙眺逺之文宜逺大功業人宜逺右養氣之法宜澄心靜慮以此景此事此人此物默存于胸中使之融化與吾心為一則此氣油然自生當有樂處文思自然流動充滿而不可遏矣切不可作氣氣不能養而作之則昏而不可用所出之言皆浮辭客氣非文也氣之變化無方當以此類推之抱題法開題以題中合說事逐一分析開寫於篇中各間架內次其先後所宜逐一說盡或以意化之或以情申之或以實事紀之或以故事彰之或以景物叙之一篇之內變換雖多句句切題也此作文入門之法非其至者也合題亦以題中合說事逐一開寫却將意融㑹作一片一口氣道盡然忌直率却於間架中要意思曲折此髙於開題也括題只取題中緊要一莭作主意餘事輕輕包括見之此最徑捷也影題並不說正題事或以故事或以他事或立議論挨傍題目而不著迹題中合說事皆影見之此變態最多反題題目或悖義理則反意說之救題題目雖悖義理而以强辭奪正理解救之引題别發逺意使人不知所從來忽然引入題去却又親切痛快此要茟力似影題而實異也影題從題中來此自題外來蹙題題繁乃蹙其文使甚簡而不漏脫題中一事衍題題虛無可說乃衍其意使甚多而無一事題外來招題將題目熟涵泳之使胸中融化消釋盡將題中合說粗話掃去就其中取出精華微妙之意作成文章超出題外而不離題中此作文之極功也眀體法頌宜典雅和粹樂宜古雅諧韶贊宜溫潤典實針宜謹嚴切直銘宜深長切實碑宜雄渾典雅碣宜質實典雅表宜張大典實傳宜質實而隨所傳之人變化行狀宜質實詳備紀宜簡實方正而隨所紀之人變化序宜疏通圎美而隨所序之事變化論宜圎折深逺說宜平易眀白辨宜方折眀白議宜方直眀切書宜簡要眀切奏宜情辭懇切意思忠厚詔宜典重溫雅謙冲惻怛之意藹然制誥宜峻厲典重分間法頭起欲緊而重大文五分腹二分頭額小文三分腹一分頭額腹中欲滿而曲折多欲健而快尾結欲輕而意足如駿馬注坡三分頭二分尾凡文如長篇古律詩騷古辭古賦碑碣之類長者腹中間架或至二三十假然其要亦不過作三莭而已其間小假間架極要分眀而不欲使人見其間架之迹蓋意分而語串意串而語分也立意法景凡天文地理物象皆景也景以氣為主意凡議論思致曲折皆意也意以理為主事凡實事故事皆事也事生於景則真情凡喜怒哀樂愛惡欲之真趣皆情也意出於情則切凡文體雖衆其意之所從來必由於此四者而出故立意之法必依此四者而求之各隨所宜以一為主而統三者於中凡文無景則枯無意則粗無事則虛無情則誣立意之法必兼四者戴帥初先生曰凡作文發意第一畨來者陳言也掃去不用第二畨來者正語也停之不可用第三畨來者精意也方可用之韓子所謂陳言之務去戞戞乎其難哉其法如此戴先生又云作文須三致意焉一篇之中三致意一假之中三致意一句之中三致意先尚書云文章猶若理詞狀也一夲事二原情三據理四按例五斷决夲事者認題也原情者眀來意也據理者守正也按例者用事也斷决者結題也五者備矣辭貴簡切而眀白用事法正用故事與題事正用者也反用故事與題事反用者也借用故事與題事絶不類以一端相近而借用之者也暗用用故事之語意而不顯其名迹對用經題用經事子題用子事史題用史事漢題用漢事三國題用三國事韓栁題用韓栁事佛志題用佛志事此正法也扳用子史百家題用經事三國題用周漢事此扳前證後亦正法也比用莊子題用列子栁文題用韓文亦正用之變也倒用經題用子史漢題用三國此有茟力者能之也泛用于正題中乃用稗官小說俗語戲談異端鄙事為證非大茟力不敢用變之又變也凡用事但可用其事意而以新語融化入吾文三語以上即不可全寫造語法正語尚書曰若稽古帝堯曰放勳帝舜曰重華協于帝大禹曰文命敷于四海臯陶曰允迪厥德謨眀弼諧春秋六鷁退飛過宋都隕石于宋皆正其事而語之拗語楚辭吉日兮辰良不言吉日兮良辰蕙殽蒸兮蘭藉奠桂酒兮椒漿不曰蒸蕙殽兮蘭藉莊子樂出虛蒸成菌不言虛出樂倒一字句法便健十倍反語論語學而時習之不亦說乎又曰愛之能勿勞乎與尚書俞哉衆非元后何戴此皆反其意而道使人悠悠致思焉纍語尚書寬而栗老子長短相形等語皆纍句也孫武子利而誘之亂而取之一莭語雖纍而辭意句句有妙者聫句尚書以親九族九族既睦大學知止而后有定定而后能靜檀弓人喜則斯陶皆聫語也歇後語論語禮云禮云玉帛云乎哉曽謂泰山不如林放乎此皆不說破正意歇後所當語而使人自思之答問語論語吾何執執御乎執射乎孟子王何必曰利亦有仁義而已矣詩云雞既鳴矣朝既盈矣匪雞則鳴蒼蠅之聲公羊榖梁尤極其變變語堯典宵中星虛舜典如西禮正月上日月正元日正月朔旦是也省語舜典至于南嶽如初禮儀禮其他如皮辨之儀此省語也助語檀弓南宫縚之妻之姑之喪一句纍三之字詩大序不知手之舞之足之蹈之纍四之字莊子尤多論語學而時習之不亦說乎但學時習說四字是實而之不亦乎五字是助語其諸異乎人之求之歟但異人求三字是實其諸乎之之歟六字是助語孟子然而無有乎爾則亦無有乎爾兩字是實八字是助語當用則不嫌多也實語尚書及易彖辭爻辭用助語極少春秋儀禮皆然此實語也凡碑碣傳紀等文不可多用助語字序論辨說等文須用助語字對語尚書命羲和仲叔四莭長對也威侮五行怠棄三正正對也天聰眀自我民聰眀天眀畏自我民眀威此對語不對字也衆非元后何戴后非衆罔與守邦此對意不對字也天叙五典天秩有禮下間以五禮有庸哉五服五章哉佑賢輔德下間以邦乃其昌散文用對語必以散語間之也隱語論語割雞焉用牛刀有美玉於斯求善價而沽諸虎兕出於柙龜玉毁於櫝中孟子城門之軌兩馬之力歟皆隱語也小雅鶴鳴古樂府藳砧全篇隱語莊列尤多婉語論語陽貨言日月逝矣嵗不我與子曰諾吾將仕矣此語直而意婉也春秋天王狩于河陽此語婉而意直也凡造語皆自然當如此則好有意為之非也下字法諧音凡下字有順文之聲而下之者若音當揚則下響字若音當抑則下嗢字審意凡下字有詳文之意而下之者意當眀則下顯字意當藏則下隱字意當尊則下童字意當卑則下輕字如此之類變化無方襲古凡下字於平穩處宜用古人曽下好字面須求其的當平實者用之取新凡下字于出竒處宜用新字面須尋不經人道語之的當新竒而不怪僻令讀之若出于自然乃善繹曽謂今世為學不可不隨宜者科舉之文是也科舉之文有不得不與朱子語録參者謹具于后一讀四書當謹守章句集注參以或問語録及文公大全集其間有或問與集注不同當從集注又有集注與語録不同者只以集注為夲而與語録參訂之一讀尚書主蔡氏參朱子語録一讀詩主朱子詩傳綱領義理都在綱領中詩傳只是訓詩傳制度參古注疏一讀周易先曉唘䝉次夲義九圖次五贊次繫辭說卦乃可讀上下經彖象文言序卦雜卦傳夲義然後讀程朱傳程朱異同處不可作是非論只是各有取用朱子是眀經程子是借經眀道一讀春秋朱子夲說皆在張洽注今科舉偶不及此蓋事實在左氏論辨在公榖斷以胡氏而取朱子語録及張洽之說折𠂻之可也一讀禮記雖主古疏然制度當訂以朱子經傳通解有朱子經傳通解有勉齊經傳通解有楊復經傳通解三書皆具然後可以考也義理當訂朱子語録一古賦有楚賦當熟讀朱子楚辭中九章離騷逺逰九歌等篇宋玉以下未可輕讀有漢賦當讀文選諸賦觀此足矣唐宋諸賦未可輕讀有唐古賦當讀文粹諸賦文苑英華中亦有絶佳者有唐律賦備見文苑英華一詔漢詔當盡取真西山文章正宗所選讀之唐詔當選取文苑英華所有之精者讀之守詔當盡取吕東萊文鑑中所選讀之一誥漢無制誥當取尚書諸誥及漢武封三王策與漢官儀命公卿諸策書讀之唐誥當取文苑英華中精者讀之宋誥當盡取東萊文鑑中所選者讀之一章漢章取文章正宗唐章取文粹宋章取吕東萊名臣奏議一表漢表即章宋表有蜀夲適用集中所選皆南渡以來渾厚典雅唐表取文苑英華一策書坊漢唐策亦可觀但分開章自章策自策不宜混雜然只董仲舒三策是正格式或賈誼治安策是正籌策文字以董為體以賈為骨而東坡策略助波瀾白居易諸策止可體面亦可已矣此上只科舉所急用如此若依朱子讀書法則尚有評章答韓莊伯讀書說讀諸經當以一經為主詩書必須通習讀詩吟咏古人性情而反之吾心之性情逹之合天下之情性只作街談俚語看不須深難求之鳥獸草朩器服之名却須通習讀考究每章每句不要拘一說隨用句句有千變萬化只要看得活推得廣用得實古注疏是漢唐經師教學者之說于淫奔􅊇亂難講處多假古事換别意以避之朱子是啇周魯十五國作詩人夲情性之說兩不可廢讀書要看堯舜禹湯文武之為君啓太甲成康之繼述髙宗之中興其政何施其事何在舜禹臯陶伊尹傳說周公召公之相業其政何施其事何在其餘聖賢所居何位所施何政所行何事隨句要歸著各人所居地位以為模楷上自帝王下自小民皆有其法須帖實有歸著看自見大抵尚書只當作為政治事樣子看便分眀也政是平治天下大經大法事是逐時小事書中不見樣者不必强求書中有樣者不可放過逐句看見各人地位處置樣子分眀又將先日所見同是此樣地位而處或同或不同者以類參合而觀則所得多矣讀易先將唘䝉看透圖書之理原卦畫眀蓍策考變占之說然後熟讀繫辭說卦太極兩儀四象八卦之理與象數昭昭在心目中却細看六十四卦彖三百八十四爻辭一字字從太極兩儀四象八卦夲然理象數中來自然見得聖人下一字皆有來歷歸著若其用處只在夫人日用間審動端而吉凶悔吝可見朱子夲義是四聖人各各夲意程子傳是吾人日用切實之理讀三禮儀禮是經周禮是緯官守所分掌者禮記是傳當分四科三百經禮以類相從而考證之在者審所歸亡者缺之四科者禮也儀也樂也制度也吉凶軍賔嘉之大目為禮應對進退拜立趨行之小莭為儀音律歌舞八音之法為樂封井宗學宫室器服之等為制度以經證經不可曲泥傳注周禮一書是文武周公平天下之法自堯典以降莫不備於此大政在六官小事具諸職有志者須要細心深思而實體之讀春秋以左氏為案正經為斷先儒二言盡之矣斷事不可先立主見將夲人所立何功所犯何罪來蹤去跡仔細推尋一小莭不究便有錯斷處功罪夲事莭莭眀白却原其情而定褒貶有兩是者有兩非者有似是而非者有似非而是者有是非各半者有是非輕重比倫者有以功補過者有以罪絀功者有初無是非者有眚灾者有功之首罪之魁不見形迹必當表而出之者平心易氣以觀其事眀目聰耳以察其情執中有權以斷其理左氏案也公羊榖梁議也然聖人之㫖微必待吾心之清眀者以裁之讀大學眀眀德章句是一書之根夲須細細切已看教分眀無罅漏致知格物章或問是聖門學知之法然須依此細看立定條目實下功夫誠意章句是聖學心學之根本朱子平生留意切至處字字切巳仔細尋思至切至切大要只是一朴實為善而巳恰是要朴實到至極處平天下章潔矩好惡是聖治心法貨德仁人小人是聖政大端治天下之要不出乎此仔細讀著實尋思用之不盡矣讀論語將問處作自已問答處作今日耳聞先儒之說至矣切矣訓詁義理在集句同異是非在或問格言遺說在朱子語類道理在今日天下之事物實用在吾身玩而味之在吾心讀孟子每章須有一兩句是主意其餘是敷衍此意而眀辨之見破主意則其餘渙然易知矣一書主意在性善實理在仁義功夫在求放心養浩氣政事在務農興學以行王道讀中庸最不易此兼眀大人之道微而顯著而隱若識得天命之謂性一句分眀方可讀下文也易就隂陽說得駁雜而有依慿中庸提出天命說雖簡約却難把捉走作便入異端慎之哉慎之哉讀孝經刋誤大體已正近吳草廬先生注詳眀矣更看黃氏夲㫖以極其趣天理人倫之夲在是讀史須分五科苐一於帝紀內看歷代興亡第二於列傳內看古今人才苐三於列傳內看古今事迹苐四於諸志內看歷代典章苐五以春秋之法斷興亡人才事迹之是非以三代斷歷代典章粹駁仍須以外史參辨誣枉凡讀史當以正史為先十七是也然後以通史通志㑹同之通鑑通典之類是也又以外史㑹要考訂之國語國策東觀荀表外書舊唐周書漢儀唐宋㑹要之類是也又以史論評確之唐鑑管見之類是也至於古史暇日亦不可不知當斷以孔子五帝德存而勿論可也讀諸子儒家荀揚文中新序說苑雜家管子吕覽賈誼淮南道家老子莊子列子抱朴子兵家孫武子吳起司馬法法家韓非子等皆文章精竒論說要妙雖所學不醇而見趨髙深可資博覽讀之當分三科一見地二文章三事料見地者諸子所造雖有大小淺深然必有所悟入處雖偏駁要必有識見見識既真自有妙理學者所志雖不同皆須有真悟處方能有所成就後世文章事業不及古人者以其悟入處淺故也讀諸子可以見之矣文章者荀卿博雅揚雄簡奧穰苴典古有先王遺風韓非嚴峭皆自成一家事料者古事也精意也句法也字樣也制度名物也助辭之變例也往往精古非漢魏以後所及皆須摘取以資茟端讀文章就今日所宜且於孟子中取長者二十餘章韓文四五十篇蘇文亦然合成百篇取時須自已意擇意中所甚喜者寫入若覺篇篇可喜截滿百篇之數即止不必多貪若篇篇不見可喜即不必强取看終集之後再轉求之雖百轉可也寫成百篇後讀書之暇每日隨意多少反復讀之或默看或批㸃隨意先粗粗看過却與分大假又與細分小莭莭假既眀觀其首尾中間相應處相變處撇掉處轉摺處寬心細目徐觀之意無昏倦老子云孰能濁以靜之徐清要必有事焉而勿正如此久久自當有得大概只要扯拽作性漸通耳毋將迎毋凝滯讀經以融貫義理讀史以該洽事實取胡氏讀史管見隱然若一敵國自立說與之相辨唯久久義理事實來於經史議論生於管見作性扯拽開於孟蘇韓文之路輻湊茟下㴞㴞不能禁止技癢欲寫即宜痛禁止之慎勿拈紙茟便作文也一拈紙茟昏氣隨至前功廢矣如此久之欲寫愈甚禁之愈切直至隨所見題目分眀有一片文字首尾中間議論句法字樣見成了了自然成文胸中不費尋思直拈茟便寫去方可拈紙茟矣此後只可因自然成文之甚眀者一寫之不可乘此便日弄紙茟仍須切禁止如前當愈嚴也禁之愈嚴其來愈多作性之道不可遏矣勉之哉此後却須從先輩求㸃化芟繁就簡掃博歸約矣文說
