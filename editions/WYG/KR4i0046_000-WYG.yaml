body:
  text: 提要文説一巻詩文評類臣等謹案文説一巻元陳繹曽撰繹曾字伯敷元史附見儒學傳作處州人而呉興續志亦載其名盖家本括蒼而徙居苕水者也至順中官至國子監助教嘗從學于戴表元而與陳旅友善師友淵源具有所自故所學頗見根柢是書乃因延祐復行科舉為程試之式而作書中分列八條論行文之法時五經皆以宋儒傳註為主懸為功令莫敢異趨故是書大㫖皆折𠂻于朱子呉興續志稱繹曽嘗著文筌譜論科舉天階使學者知所向方人爭傳録焦竑經籍志又載繹曽古今文矜式二巻今考繹曽所著文筌八巻附詩小譜二巻元時麻沙坊刻附列于䇿學統宗之首今尚有傳本其文與此篇迥殊惟科舉天階與古今文矜式今未之見疑此編即二書之一但名目錯互莫能證定今姑仍永樂大典舊題以文説著録用闕所疑巻首所稱陳文靖公盖即元翰林學士東平陳儼亦以文名至其自稱先尚書者則已失其世系無可考矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書文說元陳繹曽撰陳文靖公問為文之法繹曽以所聞於先人者對曰一養氣二抱題三眀體四分門五立意六用事七造語八下字養氣法肅朝廷之文宜肅聖賢道徳宜肅壮長江大海之文宜壮軍陣英雄之文宜壮清山林之文宜清風月貞逸宜清和宴樂之文宜和通人逹士宜和竒鬼神之文宜竒侠客髙士宜竒麗宫苑之文宜麗富貴羙人宜麗古逰覧古迹之文宜古上古人事宜古逺登髙眺逺之文宜逺大功業人宜逺右養氣之法宜澄心静慮以此景此事此人此物黙存于胸中使之融化與吾心為一則此氣油然自生當有樂處文思自然流動充滿而不可遏矣切不可作氣氣不能養而作之則昏而不可用所出之言皆浮辭客氣非文也氣之變化無方當以此類推之抱題法開題以題中合說事逐一分析開冩於篇中各間架内次其先後所宜逐一說盡或以意化之或以情申之或以實事紀之或以故事彰之或以景物叙之一篇之内變換雖多句句切題也此作文入門之法非其至者也合題亦以題中合說事逐一開冩却將意融㑹作一片一口氣道盡然忌直率却於間架中要意思曲折此髙於開題也括題只取題中緊要一莭作主意餘事輕輕包括見之此最徑㨗也影題並不說正題事或以故事或以他事或立議論挨傍題目而不着迹題中合說事皆影見之此變態最多反題題目或悖義理則反意說之救題題目雖悖義理而以强辭奪正理觧救之引題别發逺意使人不知所從来忽然引入題去却又親切痛快此要茟力似影題而實異也影題從題中来此自題外来蹙題題繁乃蹙其文使甚簡而不漏脱題中一事衍題題虚無可說乃衍其意使甚多而無一事題外来招題将題目熟涵泳之使胸中融化消釋盡将題中合說麄話掃去就其中取出精華㣲妙之意作成文章超出題外而不離題中此作文之極功也眀體法頌宜典雅和粹樂宜古雅諧韶賛宜温潤典實箴宜謹嚴切直銘宜深長切實碑宜雄渾典雅碣宜質實典雅表宜張大典實傳宜質寔而随所傳之人變化行状宜質寔詳備紀宜簡寔方正而随所紀之人變化序宜䟽通圎羙而随所序之事變化論宜圎折深逺說宜平易眀白辨宜方折眀白議宜方直眀切書宜簡要眀切奏宜情辭懇切意思忠厚詔宜典重温雅謙冲惻怛之意藹然制誥宜峻厲典重分間法頭起欲𦂳而重大文五分腹二分頭額小文三分腹一分頭額腹中欲滿而曲折多欲健而快尾結欲輕而意足如駿馬注坡三分頭二分尾凡文如長篇古律詩騷古辭古賦碑碣之類長者腹中間架或至二三十叚然其要亦不過作三莭而已其間小叚間架極要分眀而不欲使人見其間架之迹盖意分而語串意串而語分也立意法景凡天文地理物象皆景也景以氣為主意凡議論思致曲折皆意也意以理為主事凡實事故事皆事也事生於景則真情凡喜怒哀樂愛惡欲之真趣皆情也意出於情則切凡文體雖衆其意之所從来必由於此四者而出故立意之法必依此四者而求之各随所宜以一為主而統三者於中凡文無景則枯無意則麄無事則虚無情則誣立意之法必兼四者戴帥初先生曰凡作文發意第一畨来者陳言也掃去不用第二畨来者正語也停之不可用第三畨来者精意也方可用之韓子所謂陳言之務去戞戞乎其難哉其法如此戴先生又云作文湏三致意焉一篇之中三致意一叚之中三致意一句之中三致意先尚書云文章猶若理詞状也一夲事二原情三㩀理四按例五斷决夲事者認題也原情者眀来意也㩀理者守正也按例者用事也斷决者結題也五者備矣辭貴簡切而眀白用事法正用故事與題事正用者也反用故事與題事反用者也借用故事與題事絶不類以一端相近而借用之者也暗用用故事之語意而不顯其名迹對用經題用經事子題用子事史題用史事漢題用漢事三國題用三國事韓栁題用韓栁事佛志題用佛志事此正法也扳用子史百家題用經事三國題用周漢事此扳前證後亦正法也比用荘子題用列子栁文題用韓文亦正用之變也倒用經題用子史漢題用三國此有茟力者能之也汎用于正題中乃用稗官小說俗語戲談異端鄙事為證非大茟力不敢用變之又變也凡用事但可用其事意而以新語融化入吾文三語以上即不可全冩造語法正語尚書曰若稽古帝堯曰放勲帝舜曰重華協于帝大禹曰文命敷于四海臯陶曰允廸厥徳謨眀弼諧春秋六鷁退飛過宋都隕石于宋皆正其事而語之抝語楚辭吉日兮辰良不言吉日兮良辰蕙殽蒸兮蘭藉奠桂酒兮􅎛漿不曰蒸蕙殽兮蘭藉荘子樂出虚蒸成菌不言虚出樂倒一字句法便健十倍反語論語學而時習之不亦說乎又曰愛之能勿勞乎與尚書俞哉衆非元后何戴此皆反其意而道使人悠悠致思焉累語尚書寛而栗老子長短相形等語皆累句也孫武子利而誘之亂而取之一莭語雖累而辭意句句有妙者聫句尚書以親九族九族既睦大學知止而后有定定而后能静檀弓人喜則斯陶皆聫語也歇後語論語禮云禮云玉帛云乎哉曽謂泰山不如林放乎此皆不説破正意歇後所當語而使人自思之荅問語論語吾何執執御乎執射乎孟子王何必曰利亦有仁義而已矣詩云鷄既鳴矣朝既盈矣匪鷄則鳴蒼蠅之聲公羊榖梁尤極其變變語堯典宵中星虚舜典如西禮正月上日月正元日正月朔旦是也省語舜典至于南岳如初禮儀禮其他如皮弁之儀此省語也助語檀弓南宫縚之妻之姑之喪一句纍三之字詩大序不知手之舞之足之蹈之纍四之字荘子尤多論語學而時習之不亦說乎但學時習說四字是寔而之不亦乎五字是助語其諸異乎人之求之歟但異人求三字是實其諸乎之之歟六字是助語孟子然而無有乎爾則亦無有乎爾兩字是寔八字是助語當用則不嫌多也寔語尚書及易彖辭爻辭用助語極少春秋儀禮皆然此寔語也凡碑碣傳紀等文不可多用助語字序論辨說等文湏用助語字對語尚書命羲和仲叔四莭長對也威侮五行怠棄三正正對也天聰眀自我民聰眀天眀畏自我民眀威此對語不對字也衆非元后何戴后非衆㒺與守邦此對意不對字也天叙五典天秩有禮下間以五禮有庸哉五服五章哉佑賢輔徳下間以邦乃其昌散文用對語必以散語間之也隱語論語割鷄焉用牛刀有羙玉於斯求善價而沽諸虎兕出於柙龜玉毁於櫝中孟子城門之軌兩馬之力歟皆隱語也小雅鶴鳴古樂府藳砧全篇隱語荘列尤多婉語論語陽貨言日月逝矣嵗不我與子曰諾吾将仕矣此語直而意婉也春秋天王狩于河陽此語婉而意直也凡造語皆自然當如此則好有意為之非也下字法諧音凡下字有順文之聲而下之者若音當揚則下響字若音當抑則下嗢字審意凡下字有詳文之意而下之者意當眀則下顯字意當藏則下隱字意當尊則下童字意當卑則下輕字如此之類變化無方襲古凡下字於平穩處宜用古人曽下好字面湏求其的當平寔者用之取新凡下字于出竒處宜用新字面湏尋不經人道語之的當新竒而不怪僻令讀之若出于自然乃善繹曽謂今世為學不可不随宜者科舉之文是也科舉之文有不得不與朱子語録参者謹具于后一讀四書當謹守章句集註参以或問語録及文公大全集其間有或問與集註不同當從集註又有集註與語録不同者只以集註為夲而與語録参訂之一讀尚書主蔡氏参朱子語録一讀詩主朱子詩傳綱領義理都在綱領中詩傳只是訓詩傳制度参古註䟽一讀周易先曉唘䝉次夲義九圖次五賛次繫辭說卦乃可讀上下經彖象文言序卦雜卦傳夲義然後讀程朱傳程朱異同處不可作是非論只是各有取用朱子是眀經程子是借經眀道一讀春秋朱子夲說皆在張洽註今科舉偶不及此盖事寔在左氏論辨在公榖斷以胡氏而取朱子語録及張洽之說折𠂻之可也一讀禮記雖主古䟽然制度當訂以朱子經傳通觧有朱子經傳通觧有勉齋經傳通觧有楊復經傳通觧三書皆具然後可以考也義理當訂朱子語録一古賦有楚賦當熟讀朱子楚辭中九章離騷逺逰九歌等篇宋玉以下未可輕讀有漢賦當讀文選諸賦觀此足矣唐宋諸賦未可輕讀有唐古賦當讀文粹諸賦文苑英華中亦有絶佳者有唐律賦備見文苑英華一詔漢詔當盡取真西山文章正宗所選讀之唐詔當選取文苑英華所有之精者讀之守詔當盡取吕東莱文鑑中所選讀之一誥漢無制誥當取尚書諸誥及漢武封三王策與漢官儀命公卿諸策書讀之唐誥當取文苑英華中精者讀之宋誥當盡取東莱文鑑中所選者讀之一章漢章取文章正宗唐章取文粹宋章取吕東莱名臣奏議一表漢表即章宋表有蜀夲適用集中所選皆南渡以来渾厚典雅唐表取文苑英華一策書坊漢唐策亦可觀但分開章自章策自策不宜混雜然只董仲舒三策是正格式或賈誼治安策是正籌策文字以董為體以賈為骨而東坡策畧助波瀾白居易諸策止可體面亦可已矣此上只科舉所急用如此若依朱子讀書法則尚有評章荅韓荘伯讀書說讀諸經當以一經為主詩書必湏通習讀詩吟咏古人性情而反之吾心之性情逹之合天下之情性只作街談俚語看不湏深難求之鳥獸草朩器服之名却湏通習讀考究每章每句不要拘一說随用句句有千變萬化只要看得活推得廣用得寔古註䟽是漢唐經師教學者之說于滛奔􅊇亂難講處多假古事換别意以避之朱子是啇周魯十五國作詩人夲情性之說兩不可廢讀書要看堯舜禹湯文武之為君啟太甲成康之繼述髙宗之中興其政何施其事何在舜禹臯陶伊尹傳說周公召公之相業其政何施其事何在其餘聖賢所居何位所施何政所行何事随句要歸着各人所居地位以為模楷上自帝王下自小民皆有其法湏帖寔有歸着看自見大抵尚書只當作為政治事様子看便分眀也政是平治天下大經大法事是逐時小事書中不見様者不必强求書中有様者不可放過逐句看見各人地位處置様子分眀又将先日所見同是此様地位而處或同或不同者以類参合而觀則所得多矣讀易先将唘䝉看透圖書之理原卦畫眀蓍策考變占之說然後熟讀繫辭說卦太極兩儀四象八卦之理與象數昭昭在心目中却細看六十四卦彖三百八十四爻辭一字字從太極兩儀四象八卦夲然理象數中来自然見得聖人下一字皆有来歴歸着若其用處只在夫人日用間審動端而吉㓙悔吝可見朱子夲義是四聖人各各夲意程子傳是吾人日用切寔之理讀三禮儀禮是經周禮是緯官守所分掌者禮記是傳當分四科三百經禮以類相從而考證之在者審所歸亡者缺之四科者禮也儀也樂也制度也吉㓙軍賔嘉之大目為禮應對進退拜立趨行之小莭為儀音律歌舞八音之法為樂封井宗學宫室器服之等為制度以經證經不可曲泥傳註周禮一書是文武周公平天下之法自堯典以降莫不備於此大政在六官小事具諸職有志者湏要細心深思而寔體之讀春秋以左氏為案正經為斷先儒二言盡之矣斷事不可先立主見将夲人所立何功所犯何罪来蹤去跡仔細推尋一小莭不究便有錯斷處功罪夲事莭莭眀白却原其情而定褒貶有兩是者有兩非者有似是而非者有似非而是者有是非各半者有是非輕重比倫者有以功補過者有以罪絀功者有初無是非者有𤯝灾者有功之首罪之魁不見形迹必當表而出之者平心易氣以觀其事眀目聰耳以察其情執中有權以斷其理左氏案也公羊榖梁議也然聖人之㫖微必待吾心之清眀者以裁之讀大學眀眀徳章句是一書之根夲湏細細切已看教分眀無罅漏致知格物章或問是聖門學知之法然湏依此細看立定條目寔下功夫誠意章句是聖學心學之根本朱子平生留意切至處字字切巳仔細尋思至切至切大要只是一朴寔為善而巳恰是要朴寔到至極處平天下章絜矩好惡是聖治心法貨徳仁人小人是聖政大端治天下之要不出乎此仔細讀著寔尋思用之不盡矣讀論語将問處作自已問荅處作今日耳聞先儒之說至矣切矣訓詁義理在集句同異是非在或問格言遺說在朱子語類道理在今日天下之事物寔用在吾身玩而味之在吾心讀孟子每章湏有一兩句是主意其餘是敷衍此意而眀辨之見破主意則其餘渙然易知矣一書主意在性善寔理在仁義功夫在求放心養浩氣政事在務農興學以行王道讀中庸最不易此兼眀大人之道㣲而顯著而隱若識得天命之謂性一句分眀方可讀下文也易就隂陽說得駁雜而有依慿中庸提出天命說雖簡約却難把捉走作便入異端慎之哉慎之哉讀孝經刋誤大體已正近呉草廬先生註詳眀矣更看黄氏夲㫖以極其趣天理人倫之夲在是讀史湏分五科苐一於帝紀内看歴代興亡第二於列傳内看古今人才苐三於列傳内看古今事迹苐四於諸志内看歴代典章苐五以春秋之法斷興亡人才事迹之是非以三代斷歴代典章粹駁仍湏以外史参辨誣枉凡讀史當以正史為先十七是也然後以通史通志㑹同之通鑑通典之類是也又以外史㑹要考訂之國語國策東觀荀表外書舊唐周書漢儀唐宋㑹要之類是也又以史論評確之唐鑑管見之類是也至於古史暇日亦不可不知當斷以孔子五帝徳存而勿論可也讀諸子儒家荀揚文中新序說苑雜家管子吕覧賈誼淮南道家老子荘子列子抱朴子兵家孫武子呉起司馬法法家韓非子等皆文章精竒論說要妙雖所學不醇而見趨髙深可資博覧讀之當分三科一見地二文章三事料見地者諸子所造雖有大小淺深然必有所悟入處雖偏駁要必有識見見識既真自有妙理學者所志雖不同皆湏有真悟處方能有所成就後世文章事業不及古人者以其悟入處淺故也讀諸子可以見之矣文章者荀卿博雅揚雄簡奥穰苴典古有先王遺風韓非嚴峭皆自成一家事料者古事也精意也句法也字様也制度名物也助辭之變例也往往精古非漢魏以後所及皆湏摘取以資茟端讀文章就今日所宜且於孟子中取長者二十餘章韓文四五十篇蘓文亦然合成百篇取時湏自已意擇意中所甚喜者冩入若覺篇篇可喜截滿百篇之數即止不必多貪若篇篇不見可喜即不必强取看終集之後再轉求之雖百轉可也冩成百篇後讀書之暇每日随意多少反復讀之或黙看或批㸃随意先麄麄看過却與分大叚又與細分小莭莭叚既眀觀其首尾中間相應處相變處撆掉處轉摺處寛心細目徐觀之意無昏倦老子云孰能濁以静之徐清要必有事焉而勿正如此久久自當有得大概只要扯拽作性漸通耳毋将迎毋凝滯讀經以融貫義理讀史以該洽事寔取胡氏讀史管見隱然若一敵國自立說與之相辨唯久久義理事寔来於經史議論生於管見作性扯拽開於孟蘇韓文之路輻湊茟下㴞㴞不能禁止技癢欲冩即宜痛禁止之慎勿拈紙茟便作文也一拈紙茟昏氣随至前功廢矣如此久之欲冩愈甚禁之愈切直至随所見題目分眀有一片文字首尾中間議論句法字様見成了了自然成文胸中不費尋思直拈茟便冩去方可拈紙茟矣此後只可因自然成文之甚眀者一冩之不可乗此便日弄紙茟仍湏切禁止如前當愈嚴也禁之愈嚴其来愈多作性之道不可遏矣勉之哉此後却湏從先軰求㸃化芟繁就簡掃博歸約矣文説
